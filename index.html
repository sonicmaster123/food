<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>食物有效期管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 28px;
            color: #1a1a2e;
            margin-bottom: 8px;
        }

        header p {
            color: #666;
            font-size: 14px;
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: #fff;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .stat-card .number {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .stat-card .label {
            font-size: 12px;
            color: #888;
        }

        .stat-card.total .number { color: #1a1a2e; }
        .stat-card.fresh .number { color: #27ae60; }
        .stat-card.warning .number { color: #f39c12; }
        .stat-card.expired .number { color: #e74c3c; }

        .add-section {
            background: #fff;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        .add-section h2 {
            font-size: 18px;
            color: #333;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr auto;
            gap: 12px;
            align-items: end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 13px;
            color: #555;
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            padding: 10px 14px;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
            outline: none;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: #667eea;
        }

        .btn-add {
            padding: 10px 24px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            white-space: nowrap;
            height: 42px;
        }

        .btn-add:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .list-section {
            background: #fff;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .list-header h2 {
            font-size: 18px;
            color: #333;
        }

        .filter-tabs {
            display: flex;
            gap: 8px;
        }

        .filter-tab {
            padding: 6px 14px;
            border: 1.5px solid #e0e0e0;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            background: #fff;
            color: #666;
            transition: all 0.2s;
        }

        .filter-tab.active {
            background: #667eea;
            color: #fff;
            border-color: #667eea;
        }

        .food-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .food-item {
            display: grid;
            grid-template-columns: auto 1fr auto auto;
            align-items: center;
            gap: 16px;
            padding: 14px 18px;
            border-radius: 12px;
            border: 1.5px solid #f0f0f0;
            transition: all 0.2s;
        }

        .food-item:hover {
            border-color: #667eea;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.1);
        }

        .food-item.status-fresh {
            border-left: 4px solid #27ae60;
        }

        .food-item.status-warning {
            border-left: 4px solid #f39c12;
            background: #fffbf0;
        }

        .food-item.status-expired {
            border-left: 4px solid #e74c3c;
            background: #fff5f5;
        }

        .food-item.status-consumed {
            border-left: 4px solid #95a5a6;
            opacity: 0.6;
        }

        .food-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background: #f8f9fa;
        }

        .food-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .food-name {
            font-size: 15px;
            font-weight: 600;
            color: #333;
        }

        .food-meta {
            font-size: 12px;
            color: #888;
            display: flex;
            gap: 12px;
        }

        .food-status {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-fresh {
            background: #e8f8f0;
            color: #27ae60;
        }

        .badge-warning {
            background: #fef3e0;
            color: #f39c12;
        }

        .badge-expired {
            background: #fde8e8;
            color: #e74c3c;
        }

        .badge-consumed {
            background: #eee;
            color: #95a5a6;
        }

        .days-left {
            font-size: 12px;
            color: #888;
        }

        .food-actions {
            display: flex;
            gap: 6px;
        }

        .btn-action {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-consume {
            background: #e8f8f0;
            color: #27ae60;
        }

        .btn-consume:hover {
            background: #27ae60;
            color: #fff;
        }

        .btn-delete {
            background: #fde8e8;
            color: #e74c3c;
        }

        .btn-delete:hover {
            background: #e74c3c;
            color: #fff;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #aaa;
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 14px 20px;
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
            transform: translateX(120%);
            transition: transform 0.3s ease;
            z-index: 1000;
            max-width: 320px;
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification.success { background: #27ae60; }
        .notification.warning { background: #f39c12; }
        .notification.error { background: #e74c3c; }
        .notification.info { background: #667eea; }

        .search-box {
            padding: 8px 14px;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            font-size: 13px;
            outline: none;
            width: 180px;
            transition: border-color 0.2s;
        }

        .search-box:focus {
            border-color: #667eea;
        }

        .sort-select {
            padding: 6px 10px;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            font-size: 12px;
            outline: none;
            cursor: pointer;
        }

        .toolbar {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr 1fr;
            }

            .stats-bar {
                grid-template-columns: repeat(2, 1fr);
            }

            .list-header {
                flex-direction: column;
                gap: 12px;
                align-items: flex-start;
            }

            .filter-tabs {
                flex-wrap: wrap;
            }

            .food-item {
                grid-template-columns: auto 1fr;
                gap: 10px;
            }

            .food-status, .food-actions {
                grid-column: 2;
            }
        }

        @media (max-width: 480px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .toolbar {
                flex-wrap: wrap;
            }
        }

        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;
            border-radius: 12px;
            padding: 12px 24px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .nav-brand {
            font-size: 18px;
            font-weight: 700;
            color: #1a1a2e;
        }

        .nav-tabs {
            display: flex;
            gap: 8px;
        }

        .nav-tab {
            padding: 8px 20px;
            border: 1.5px solid #e0e0e0;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            background: #fff;
            color: #666;
            transition: all 0.2s;
            font-weight: 500;
        }

        .nav-tab.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border-color: #667eea;
        }

        .nav-tab:hover:not(.active) {
            border-color: #667eea;
            color: #667eea;
        }

        .pwd-item {
            display: grid;
            grid-template-columns: 48px 1fr auto;
            align-items: center;
            gap: 16px;
            padding: 14px 18px;
            border-radius: 12px;
            border: 1.5px solid #f0f0f0;
            transition: all 0.2s;
        }

        .pwd-item:hover {
            border-color: #667eea;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.1);
        }

        .pwd-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #f8f9fa;
        }

        .pwd-icon img {
            width: 28px;
            height: 28px;
            object-fit: contain;
        }

        .pwd-icon .fallback-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .pwd-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
        }

        .pwd-site-name {
            font-size: 15px;
            font-weight: 600;
            color: #333;
        }

        .pwd-username {
            font-size: 13px;
            color: #888;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .pwd-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .btn-copy {
            background: #e8f0fe;
            color: #1a73e8;
        }

        .btn-copy:hover {
            background: #1a73e8;
            color: #fff;
        }

        .btn-reveal {
            background: #f3e8ff;
            color: #764ba2;
        }

        .btn-reveal:hover {
            background: #764ba2;
            color: #fff;
        }

        .btn-edit {
            background: #fff3e0;
            color: #f39c12;
        }

        .btn-edit:hover {
            background: #f39c12;
            color: #fff;
        }

        @media (max-width: 768px) {
            .nav-bar {
                flex-direction: column;
                gap: 12px;
            }

            .pwd-item {
                grid-template-columns: 40px 1fr;
                gap: 10px;
            }

            .pwd-actions {
                grid-column: 1 / -1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="nav-bar">
            <div class="nav-brand">🏠 生活管家</div>
            <div class="nav-tabs">
                <button class="nav-tab active" data-page="food" onclick="switchPage('food')">🥗 食物管理</button>
                <button class="nav-tab" data-page="password" onclick="switchPage('password')">🔐 密码管理</button>
            </div>
        </nav>

        <div class="page-content" id="page-food">
        <header>
            <h1>🍱 食物有效期管理</h1>
            <p>轻松管理您的食物保质期，减少浪费</p>
        </header>

        <div class="stats-bar">
            <div class="stat-card total">
                <div class="number" id="stat-total">0</div>
                <div class="label">总计食物</div>
            </div>
            <div class="stat-card fresh">
                <div class="number" id="stat-fresh">0</div>
                <div class="label">新鲜</div>
            </div>
            <div class="stat-card warning">
                <div class="number" id="stat-warning">0</div>
                <div class="label">即将过期</div>
            </div>
            <div class="stat-card expired">
                <div class="number" id="stat-expired">0</div>
                <div class="label">已过期</div>
            </div>
        </div>

        <div class="add-section">
            <h2>➕ 添加食物</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label>食物名称</label>
                    <input type="text" id="food-name" placeholder="例如：牛奶">
                </div>
                <div class="form-group">
                    <label>分类</label>
                    <select id="food-category">
                        <option value="dairy">🥛 乳制品</option>
                        <option value="meat">🥩 肉类</option>
                        <option value="vegetable">🥬 蔬菜</option>
                        <option value="fruit">🍎 水果</option>
                        <option value="grain">🍞 谷物</option>
                        <option value="beverage">🥤 饮品</option>
                        <option value="snack">🍪 零食</option>
                        <option value="condiment">🧂 调味品</option>
                        <option value="frozen">🧊 冷冻食品</option>
                        <option value="other">📦 其他</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>过期日期</label>
                    <input type="date" id="food-expiry">
                </div>
                <button class="btn-add" onclick="addFood()">添加</button>
            </div>
        </div>

        <div class="list-section">
            <div class="list-header">
                <h2>📋 食物列表</h2>
                <div class="toolbar">
                    <input type="text" class="search-box" id="search-input" placeholder="搜索食物..." oninput="renderList()">
                    <select class="sort-select" id="sort-select" onchange="renderList()">
                        <option value="expiry-asc">到期日期 ↑</option>
                        <option value="expiry-desc">到期日期 ↓</option>
                        <option value="name">名称排序</option>
                        <option value="added">添加时间</option>
                    </select>
                </div>
            </div>
            <div class="filter-tabs">
                <button class="filter-tab active" data-filter="all" onclick="setFilter('all')">全部</button>
                <button class="filter-tab" data-filter="fresh" onclick="setFilter('fresh')">新鲜</button>
                <button class="filter-tab" data-filter="warning" onclick="setFilter('warning')">即将过期</button>
                <button class="filter-tab" data-filter="expired" onclick="setFilter('expired')">已过期</button>
                <button class="filter-tab" data-filter="consumed" onclick="setFilter('consumed')">已食用</button>
            </div>
            <div class="food-list" id="food-list"></div>
        </div>
        </div><!-- end page-food -->

        <div class="page-content" id="page-password" style="display:none;">
            <header>
                <h1>🔐 密码管理</h1>
                <p>安全存储和管理您的账号密码</p>
            </header>

            <div class="stats-bar" style="grid-template-columns: repeat(2, 1fr);">
                <div class="stat-card total">
                    <div class="number" id="pwd-stat-total">0</div>
                    <div class="label">总计账号</div>
                </div>
                <div class="stat-card fresh">
                    <div class="number" id="pwd-stat-domains">0</div>
                    <div class="label">不同站点</div>
                </div>
            </div>

            <div class="add-section">
                <h2>➕ 添加账号</h2>
                <div class="form-grid" style="grid-template-columns: 1fr 1fr;">
                    <div class="form-group">
                        <label>站点/应用名称</label>
                        <input type="text" id="pwd-site-name" placeholder="例如：GitHub、微信">
                    </div>
                    <div class="form-group">
                        <label>网址/域名</label>
                        <input type="text" id="pwd-domain" placeholder="例如：github.com">
                    </div>
                    <div class="form-group">
                        <label>用户名/邮箱</label>
                        <input type="text" id="pwd-username" placeholder="例如：user@example.com">
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="pwd-password" placeholder="输入密码">
                    </div>
                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label>备注</label>
                        <input type="text" id="pwd-notes" placeholder="可选备注信息">
                    </div>
                </div>
                <div style="margin-top: 12px; display: flex; gap: 8px;">
                    <button class="btn-add" onclick="savePassword()">保存</button>
                    <button class="btn-add" style="background: #eee; color: #666;" onclick="cancelEditPassword()" id="btn-cancel-pwd" hidden>取消编辑</button>
                </div>
            </div>

            <div class="list-section">
                <div class="list-header">
                    <h2>📋 账号列表</h2>
                    <div class="toolbar">
                        <input type="text" class="search-box" id="pwd-search-input" placeholder="搜索账号..." oninput="renderPasswordList()">
                    </div>
                </div>
                <div class="food-list" id="password-list"></div>
            </div>
        </div><!-- end page-password -->
    </div>

    <div class="notification" id="notification"></div>

    <script>
        const STORAGE_KEY = 'food_expiry_manager';
        const WARNING_DAYS = 3;

        let foods = [];
        let currentFilter = 'all';

        const categoryIcons = {
            dairy: '🥛', meat: '🥩', vegetable: '🥬', fruit: '🍎',
            grain: '🍞', beverage: '🥤', snack: '🍪', condiment: '🧂',
            frozen: '🧊', other: '📦'
        };

        const categoryNames = {
            dairy: '乳制品', meat: '肉类', vegetable: '蔬菜', fruit: '水果',
            grain: '谷物', beverage: '饮品', snack: '零食', condiment: '调味品',
            frozen: '冷冻食品', other: '其他'
        };

        async function init() {
            await loadData();
            await migrateLocalStorage();
            renderList();
            updateStats();
            checkExpiryNotifications();
            document.getElementById('food-expiry').valueAsDate = new Date(Date.now() + 7 * 86400000);
        }

        async function loadData() {
            try {
                const res = await fetch('/api/foods');
                foods = await res.json();
            } catch (e) {
                const data = localStorage.getItem(STORAGE_KEY);
                if (data) foods = JSON.parse(data);
            }
        }

        async function migrateLocalStorage() {
            const data = localStorage.getItem(STORAGE_KEY);
            const migrated = localStorage.getItem('food_expiry_migrated');
            if (data && !migrated) {
                const localFoods = JSON.parse(data);
                if (localFoods.length > 0) {
                    await fetch('/api/foods/sync', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(localFoods)
                    });
                    const res = await fetch('/api/foods');
                    foods = await res.json();
                }
                localStorage.setItem('food_expiry_migrated', 'true');
            }
        }

        async function addFood() {
            const nameInput = document.getElementById('food-name');
            const categoryInput = document.getElementById('food-category');
            const expiryInput = document.getElementById('food-expiry');

            const name = nameInput.value.trim();
            const category = categoryInput.value;
            const expiry = expiryInput.value;

            if (!name) {
                showNotification('请输入食物名称', 'error');
                nameInput.focus();
                return;
            }
            if (!expiry) {
                showNotification('请选择过期日期', 'error');
                expiryInput.focus();
                return;
            }

            const food = {
                id: Date.now().toString(36) + Math.random().toString(36).substr(2, 5),
                name,
                category,
                expiry,
                addedAt: new Date().toISOString(),
                consumed: false
            };

            try {
                await fetch('/api/foods', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(food)
                });
                foods.push(food);
                renderList();
                updateStats();
                nameInput.value = '';
                expiryInput.valueAsDate = new Date(Date.now() + 7 * 86400000);
                nameInput.focus();
                showNotification(`已添加「${name}」`, 'success');
            } catch (e) {
                showNotification('保存失败，请重试', 'error');
            }
        }

        async function consumeFood(id) {
            const food = foods.find(f => f.id === id);
            if (food) {
                try {
                    const res = await fetch(`/api/foods/${id}/consume`, { method: 'PUT' });
                    const data = await res.json();
                    food.consumed = true;
                    food.consumedAt = data.consumedAt;
                    renderList();
                    updateStats();
                    showNotification(`已将「${food.name}」标记为已食用`, 'info');
                } catch (e) {
                    showNotification('操作失败，请重试', 'error');
                }
            }
        }

        async function deleteFood(id) {
            const food = foods.find(f => f.id === id);
            if (food && confirm(`确定要删除「${food.name}」吗？`)) {
                try {
                    await fetch(`/api/foods/${id}`, { method: 'DELETE' });
                    foods = foods.filter(f => f.id !== id);
                    renderList();
                    updateStats();
                    showNotification(`已删除「${food.name}」`, 'warning');
                } catch (e) {
                    showNotification('删除失败，请重试', 'error');
                }
            }
        }

        function getStatus(food) {
            if (food.consumed) return 'consumed';
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const expiry = new Date(food.expiry);
            expiry.setHours(0, 0, 0, 0);
            const diffDays = Math.ceil((expiry - today) / 86400000);

            if (diffDays < 0) return 'expired';
            if (diffDays <= WARNING_DAYS) return 'warning';
            return 'fresh';
        }

        function getDaysText(food) {
            if (food.consumed) return '已食用';
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const expiry = new Date(food.expiry);
            expiry.setHours(0, 0, 0, 0);
            const diffDays = Math.ceil((expiry - today) / 86400000);

            if (diffDays < 0) return `已过期 ${Math.abs(diffDays)} 天`;
            if (diffDays === 0) return '今天过期';
            if (diffDays === 1) return '明天过期';
            return `还有 ${diffDays} 天`;
        }

        function getStatusBadge(status) {
            const map = {
                fresh: { class: 'badge-fresh', text: '新鲜' },
                warning: { class: 'badge-warning', text: '即将过期' },
                expired: { class: 'badge-expired', text: '已过期' },
                consumed: { class: 'badge-consumed', text: '已食用' }
            };
            return map[status];
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.filter === filter);
            });
            renderList();
        }

        function getFilteredAndSortedFoods() {
            const search = document.getElementById('search-input').value.trim().toLowerCase();
            const sort = document.getElementById('sort-select').value;

            let filtered = foods.filter(food => {
                if (currentFilter !== 'all' && getStatus(food) !== currentFilter) return false;
                if (search && !food.name.toLowerCase().includes(search) &&
                    !categoryNames[food.category].includes(search)) return false;
                return true;
            });

            filtered.sort((a, b) => {
                switch (sort) {
                    case 'expiry-asc': return new Date(a.expiry) - new Date(b.expiry);
                    case 'expiry-desc': return new Date(b.expiry) - new Date(a.expiry);
                    case 'name': return a.name.localeCompare(b.name, 'zh');
                    case 'added': return new Date(b.addedAt) - new Date(a.addedAt);
                    default: return 0;
                }
            });

            return filtered;
        }

        function renderList() {
            const list = document.getElementById('food-list');
            const filtered = getFilteredAndSortedFoods();

            if (filtered.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">🍽️</div>
                        <p>暂无食物记录</p>
                    </div>`;
                return;
            }

            list.innerHTML = filtered.map(food => {
                const status = getStatus(food);
                const badge = getStatusBadge(status);
                const icon = categoryIcons[food.category];
                const catName = categoryNames[food.category];

                return `
                    <div class="food-item status-${status}">
                        <div class="food-icon">${icon}</div>
                        <div class="food-info">
                            <div class="food-name">${escapeHtml(food.name)}</div>
                            <div class="food-meta">
                                <span>${catName}</span>
                                <span>过期：${food.expiry}</span>
                            </div>
                        </div>
                        <div class="food-status">
                            <span class="status-badge ${badge.class}">${badge.text}</span>
                            <span class="days-left">${getDaysText(food)}</span>
                        </div>
                        <div class="food-actions">
                            ${!food.consumed ? `<button class="btn-action btn-consume" onclick="consumeFood('${food.id}')">✓ 已食用</button>` : ''}
                            <button class="btn-action btn-delete" onclick="deleteFood('${food.id}')">删除</button>
                        </div>
                    </div>`;
            }).join('');
        }

        function updateStats() {
            const active = foods.filter(f => !f.consumed);
            const fresh = active.filter(f => getStatus(f) === 'fresh').length;
            const warning = active.filter(f => getStatus(f) === 'warning').length;
            const expired = active.filter(f => getStatus(f) === 'expired').length;

            document.getElementById('stat-total').textContent = active.length;
            document.getElementById('stat-fresh').textContent = fresh;
            document.getElementById('stat-warning').textContent = warning;
            document.getElementById('stat-expired').textContent = expired;
        }

        function checkExpiryNotifications() {
            const warningFoods = foods.filter(f => !f.consumed && getStatus(f) === 'warning');
            const expiredFoods = foods.filter(f => !f.consumed && getStatus(f) === 'expired');

            if (expiredFoods.length > 0) {
                showNotification(`⚠️ 有 ${expiredFoods.length} 件食物已过期，请及时处理！`, 'error', 5000);
            } else if (warningFoods.length > 0) {
                showNotification(`⏰ 有 ${warningFoods.length} 件食物即将过期，请留意！`, 'warning', 4000);
            }
        }

        function showNotification(message, type = 'info', duration = 3000) {
            const el = document.getElementById('notification');
            el.textContent = message;
            el.className = `notification ${type} show`;
            setTimeout(() => {
                el.classList.remove('show');
            }, duration);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.getElementById('food-name').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addFood();
        });

        init();

        // Page Navigation
        function switchPage(page) {
            document.querySelectorAll('.page-content').forEach(el => el.style.display = 'none');
            document.getElementById('page-' + page).style.display = 'block';
            document.querySelectorAll('.nav-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.page === page);
            });
            if (page === 'password') loadPasswords();
        }

        // Password Manager
        let passwords = [];
        let editingPasswordId = null;

        const appDomainMap = {
            '微信': 'weixin.qq.com', 'wechat': 'weixin.qq.com',
            '支付宝': 'alipay.com', '淘宝': 'taobao.com',
            '京东': 'jd.com', '抖音': 'douyin.com',
            '百度': 'baidu.com', 'qq': 'qq.com',
            '微博': 'weibo.com', '哔哩哔哩': 'bilibili.com',
            'bilibili': 'bilibili.com', '知乎': 'zhihu.com',
            '美团': 'meituan.com', '饿了么': 'ele.me',
            '网易': '163.com', '拼多多': 'pinduoduo.com',
            '小红书': 'xiaohongshu.com', 'github': 'github.com',
            'google': 'google.com', 'gmail': 'gmail.com',
            'facebook': 'facebook.com', 'twitter': 'twitter.com',
            'instagram': 'instagram.com', 'apple': 'apple.com',
            'microsoft': 'microsoft.com', 'amazon': 'amazon.com',
            'netflix': 'netflix.com', 'spotify': 'spotify.com',
            'steam': 'store.steampowered.com', 'discord': 'discord.com'
        };

        function resolveDomain(item) {
            let domain = item.domain;
            if (!domain) {
                const lowerName = item.siteName.toLowerCase();
                domain = appDomainMap[lowerName] || appDomainMap[item.siteName];
            }
            if (!domain && item.username && item.username.includes('@')) {
                domain = item.username.split('@')[1];
            }
            if (domain) {
                domain = domain.replace(/^https?:\/\//, '').replace(/\/.*$/, '').replace(/^www\./, '');
            }
            return domain || null;
        }

        function getIconForPassword(item) {
            const domain = resolveDomain(item);
            const char = item.siteName.charAt(0).toUpperCase();
            if (domain) {
                return `<img src="https://${domain}/favicon.ico" onerror="handleIconError(this, '${encodeURIComponent(domain)}', '${char}')" alt="">`;
            }
            return `<div class="fallback-icon">${char}</div>`;
        }

        function handleIconError(img, domain, char) {
            const decodedDomain = decodeURIComponent(domain);
            if (!img.dataset.tried) {
                img.dataset.tried = '1';
                img.src = 'https://favicon.cccyun.cc/' + decodedDomain;
            } else {
                img.parentElement.innerHTML = '<div class="fallback-icon">' + char + '</div>';
            }
        }

        async function loadPasswords() {
            try {
                const res = await fetch('/api/passwords');
                passwords = await res.json();
                renderPasswordList();
                updatePasswordStats();
            } catch (e) {
                showNotification('加载密码列表失败', 'error');
            }
        }

        function updatePasswordStats() {
            document.getElementById('pwd-stat-total').textContent = passwords.length;
            const domains = new Set(passwords.map(p => p.domain).filter(Boolean));
            document.getElementById('pwd-stat-domains').textContent = domains.size;
        }

        function renderPasswordList() {
            const list = document.getElementById('password-list');
            const search = document.getElementById('pwd-search-input').value.trim().toLowerCase();

            let filtered = passwords;
            if (search) {
                filtered = passwords.filter(p =>
                    p.siteName.toLowerCase().includes(search) ||
                    p.username.toLowerCase().includes(search) ||
                    (p.domain && p.domain.toLowerCase().includes(search))
                );
            }

            if (filtered.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">🔐</div>
                        <p>暂无保存的密码</p>
                    </div>`;
                return;
            }

            list.innerHTML = filtered.map(item => `
                <div class="pwd-item">
                    <div class="pwd-icon">${getIconForPassword(item)}</div>
                    <div class="pwd-info">
                        <div class="pwd-site-name">${escapeHtml(item.siteName)}</div>
                        <div class="pwd-username">${escapeHtml(item.username)}${item.domain ? ' · ' + escapeHtml(item.domain) : ''}</div>
                    </div>
                    <div class="pwd-actions">
                        <button class="btn-action btn-copy" onclick="copyPassword(${item.id})">📋 复制</button>
                        <button class="btn-action btn-reveal" onclick="revealPassword(${item.id}, this)">👁 查看</button>
                        <button class="btn-action btn-edit" onclick="editPassword(${item.id})">✏️ 编辑</button>
                        <button class="btn-action btn-delete" onclick="deletePassword(${item.id})">删除</button>
                    </div>
                </div>
            `).join('');
        }

        async function savePassword() {
            const siteName = document.getElementById('pwd-site-name').value.trim();
            const domain = document.getElementById('pwd-domain').value.trim();
            const username = document.getElementById('pwd-username').value.trim();
            const password = document.getElementById('pwd-password').value;
            const notes = document.getElementById('pwd-notes').value.trim();

            if (!siteName) { showNotification('请输入站点名称', 'error'); return; }
            if (!username) { showNotification('请输入用户名', 'error'); return; }
            if (!password && !editingPasswordId) { showNotification('请输入密码', 'error'); return; }

            const body = { siteName, domain, username, password, notes };

            try {
                if (editingPasswordId) {
                    const res = await fetch(`/api/passwords/${editingPasswordId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });
                    if (!res.ok) throw new Error('Server error');
                    const idx = passwords.findIndex(p => p.id === editingPasswordId);
                    if (idx !== -1) {
                        passwords[idx].siteName = siteName;
                        passwords[idx].domain = domain || null;
                        passwords[idx].username = username;
                        passwords[idx].notes = notes || null;
                    }
                    showNotification('密码已更新', 'success');
                } else {
                    const res = await fetch('/api/passwords', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });
                    if (!res.ok) throw new Error('Server error');
                    const data = await res.json();
                    passwords.push({
                        id: data.id,
                        siteName,
                        domain: domain || null,
                        username,
                        notes: notes || null
                    });
                    showNotification(`已保存「${siteName}」的密码`, 'success');
                }
                cancelEditPassword();
                renderPasswordList();
                updatePasswordStats();
            } catch (e) {
                showNotification('保存失败，请重试', 'error');
            }
        }

        function editPassword(id) {
            const item = passwords.find(p => p.id === id);
            if (!item) return;

            editingPasswordId = id;
            document.getElementById('pwd-site-name').value = item.siteName;
            document.getElementById('pwd-domain').value = item.domain || '';
            document.getElementById('pwd-username').value = item.username;
            document.getElementById('pwd-password').value = '';
            document.getElementById('pwd-password').placeholder = '留空则不修改';
            document.getElementById('pwd-notes').value = item.notes || '';
            document.getElementById('btn-cancel-pwd').hidden = false;
            document.getElementById('pwd-site-name').focus();
        }

        function cancelEditPassword() {
            editingPasswordId = null;
            document.getElementById('pwd-site-name').value = '';
            document.getElementById('pwd-domain').value = '';
            document.getElementById('pwd-username').value = '';
            document.getElementById('pwd-password').value = '';
            document.getElementById('pwd-password').placeholder = '输入密码';
            document.getElementById('pwd-notes').value = '';
            document.getElementById('btn-cancel-pwd').hidden = true;
        }

        async function copyPassword(id) {
            try {
                const res = await fetch(`/api/passwords/${id}/reveal`);
                const data = await res.json();
                await navigator.clipboard.writeText(data.password);
                showNotification('密码已复制到剪贴板', 'success');
            } catch (e) {
                showNotification('复制失败', 'error');
            }
        }

        async function revealPassword(id, btn) {
            try {
                const res = await fetch(`/api/passwords/${id}/reveal`);
                const data = await res.json();
                const originalText = btn.textContent;
                btn.textContent = data.password;
                btn.style.fontFamily = 'monospace';
                btn.style.fontSize = '11px';
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.style.fontFamily = '';
                    btn.style.fontSize = '';
                }, 3000);
            } catch (e) {
                showNotification('查看密码失败', 'error');
            }
        }

        async function deletePassword(id) {
            const item = passwords.find(p => p.id === id);
            if (item && confirm(`确定要删除「${item.siteName}」的密码吗？`)) {
                try {
                    const res = await fetch(`/api/passwords/${id}`, { method: 'DELETE' });
                    if (!res.ok) throw new Error('Server error');
                    passwords = passwords.filter(p => p.id !== id);
                    renderPasswordList();
                    updatePasswordStats();
                    showNotification(`已删除「${item.siteName}」`, 'warning');
                } catch (e) {
                    showNotification('删除失败', 'error');
                }
            }
        }
    </script>
</body>
</html>
